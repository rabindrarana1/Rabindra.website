<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rabindra Rana Helping Website</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(120deg,#f6f9fc,#e9f0ff);
}

/* HEADER */
header {
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#profilePic {
    width:65px;
    height:65px;
    border-radius:50%;
    border:3px solid white;
}

/* CONTAINER */
.container { padding:20px; }

/* NEWS CARD */
.news {
    background:white;
    padding:15px;
    margin-top:15px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    border-left:5px solid #ff416c;
}

.news img {
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
}

.vertical { aspect-ratio:9/16; object-fit:cover; }
.horizontal { aspect-ratio:16/9; object-fit:cover; }
.square { aspect-ratio:1/1; object-fit:cover; }

/* BUTTON */
button {
    padding:8px 14px;
    margin:5px;
    border:none;
    background:linear-gradient(45deg,#36d1dc,#5b86e5);
    color:white;
    border-radius:20px;
    cursor:pointer;
}

/* TEXTAREA */
textarea {
    width:100%;
    height:100px;
    border-radius:10px;
    padding:10px;
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

/* SEARCH */
#searchInput { margin:10px 0; }

/* HIGHLIGHT */
.highlight {
    background:linear-gradient(45deg,gold,orange);
    padding:12px;
    border-radius:10px;
    font-weight:bold;
}
</style>

</head>
<body>

<header>
<h1>Rabindra Rana Helping Website</h1>
<img id="profilePic">
</header>

<div class="container">

<h2>🧑 About Me</h2>
<p>रबिन्द्र राना</p>

<hr>

<button onclick="login()">Admin Login</button>

<div id="adminPanel" style="display:none;">
<input type="file" id="profileInput">
<button onclick="uploadPhoto()">Change Photo</button>

<br><br>
<input type="file" id="newsImage">
<select id="imageStyle">
    <option value="horizontal">📺 YouTube (16:9)</option>
    <option value="vertical">📱 TikTok (9:16)</option>
    <option value="square">🟦 Square (1:1)</option>
    <option value="normal">Normal</option>
</select>

<br><br>
<textarea id="newsInput" placeholder="नयाँ न्युज लेख्नुहोस्"></textarea>
<button onclick="addNews()">Post News</button>

<br><br>
<button onclick="changePassword()">Change Password</button>
</div>

<hr>

<input type="text" id="searchInput" placeholder="🔍 News खोज्नुहोस्..." onkeyup="searchNews()">

<div class="highlight">📌 आजका मुख्य समाचार</div>
<div id="newsContainer"></div>

<hr>
<h2>💬 आफ्नो समस्या हामीलाई पठाउनुहोस्</h2>
<form id="feedbackForm">
    <input type="text" id="viewerName" placeholder="तपाईंको नाम" required><br><br>
    <input type="text" id="viewerContact" placeholder="Gmail ID वा Phone Number" required><br><br>
    <textarea id="viewerProblem" placeholder="तपाईंको समस्या यहाँ लेख्नुहोस्" required></textarea><br><br>
    <button type="submit">Submit</button>
</form>
<div id="feedbackMsg" style="color:green; margin-top:10px;"></div>

</div>

<script>

// PASSWORD SYSTEM
let PASSWORD = localStorage.getItem("adminPass") || "admin123";
let isAdmin = false;

// LOGIN
function login(){
    let pass = prompt("Enter Admin Password:");
    if(pass === PASSWORD){
        isAdmin = true;
        document.getElementById("adminPanel").style.display = "block";
        displayNews();
    } else {
        alert("Wrong Password!");
    }
}

// CHANGE PASSWORD
function changePassword(){
    let oldPass = prompt("पुरानो Password हाल्नुहोस्:");
    if(oldPass !== PASSWORD){ alert("Wrong Old Password!"); return; }
    let newPass = prompt("नयाँ Password हाल्नुहोस्:");
    if(newPass && newPass.length >= 4){
        PASSWORD = newPass;
        localStorage.setItem("adminPass", newPass);
        alert("Password changed!");
    }
}

// PROFILE PHOTO
function uploadPhoto(){
    let last = localStorage.getItem("photoTime");
    let now = new Date().getTime();
    if(last && now - last < 86400000){ alert("24 घण्टा पछि मात्र change!"); return; }

    let file = document.getElementById("profileInput").files[0];
    let reader = new FileReader();
    reader.onload = function(e){
        localStorage.setItem("profilePic", e.target.result);
        localStorage.setItem("photoTime", now);
        document.getElementById("profilePic").src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// LOAD PROFILE
let saved = localStorage.getItem("profilePic");
if(saved) document.getElementById("profilePic").src = saved;

// ADD NEWS WITH IMAGE STYLE
function addNews(){
    let text = document.getElementById("newsInput").value;
    let file = document.getElementById("newsImage").files[0];
    let style = document.getElementById("imageStyle").value;
    if(text.trim() === "") return;

    let reader = new FileReader();
    reader.onload = function(e){
        let newsList = JSON.parse(localStorage.getItem("newsList")) || [];
        newsList.unshift({
            text: text,
            image: e.target.result,
            style: style,
            time: new Date().toLocaleString()
        });
        localStorage.setItem("newsList", JSON.stringify(newsList));
        document.getElementById("newsInput").value = "";
        document.getElementById("newsImage").value = "";
        displayNews();
    };
    if(file){ reader.readAsDataURL(file); }
    else{ reader.onload({target:{result:""}}); }
}

// DISPLAY NEWS
function displayNews(){
    let newsList = JSON.parse(localStorage.getItem("newsList")) || [];
    let container = document.getElementById("newsContainer");
    container.innerHTML = "";
    newsList.forEach((news,index)=>{
        container.innerHTML += `
        <div class="news">
            ${news.image ? `<img src="${news.image}" class="${news.style}">` : ""}
            <p>${news.text}</p>
            <small>${news.time}</small><br>
            ${isAdmin ? `<button onclick="editNews(${index})">Edit</button>
            <button onclick="deleteNews(${index})">Delete</button>` : ""}
        </div>`;
    });
}

// DELETE
function deleteNews(index){
    let newsList = JSON.parse(localStorage.getItem("newsList")) || [];
    newsList.splice(index,1);
    localStorage.setItem("newsList", JSON.stringify(newsList));
    displayNews();
}

// EDIT
function editNews(index){
    let newsList = JSON.parse(localStorage.getItem("newsList")) || [];
    let newText = prompt("Edit News:", newsList[index].text);
    if(newText){
        newsList[index].text = newText;
        localStorage.setItem("newsList", JSON.stringify(newsList));
        displayNews();
    }
}

// SEARCH
function searchNews(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let newsList = JSON.parse(localStorage.getItem("newsList")) || [];
    let container = document.getElementById("newsContainer");
    container.innerHTML = "";
    newsList.forEach((news,index)=>{
        if(news.text.toLowerCase().includes(input)){
            container.innerHTML += `
            <div class="news">
                ${news.image ? `<img src="${news.image}" class="${news.style}">` : ""}
                <p>${news.text}</p>
                <small>${news.time}</small><br>
                ${isAdmin ? `<button onclick="editNews(${index})">Edit</button>
                <button onclick="deleteNews(${index})">Delete</button>` : ""}
            </div>`;
        }
    });
}

// LOAD
displayNews();

// FEEDBACK FORM
document.getElementById("feedbackForm").addEventListener("submit", function(e){
    e.preventDefault();
    let name = document.getElementById("viewerName").value.trim();
    let contact = document.getElementById("viewerContact").value.trim();
    let problem = document.getElementById("viewerProblem").value.trim();
    if(!name || !contact || !problem){ alert("सबै field अनिवार्य छ!"); return; }

    let feedbackList = JSON.parse(localStorage.getItem("feedbackList")) || [];
    feedbackList.push({
        name: name,
        contact: contact,
        problem: problem,
        time: new Date().toLocaleString()
    });
    localStorage.setItem("feedbackList", JSON.stringify(feedbackList));
    document.getElementById("feedbackMsg").innerText = "तपाईंको समस्या submit भयो! धन्यवाद 🙏";
    document.getElementById("feedbackForm").reset();
});
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>व्यापारी बिल सिस्टम</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(120deg, #f6f9fc, #e9f0ff);
    padding: 20px;
}

h2 {
    text-align: center;
    background: linear-gradient(45deg,#36d1dc,#5b86e5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

#invoiceContainer {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

#invoiceContainer input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
}

#invoiceTable {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

#invoiceTable th, #invoiceTable td {
    padding: 10px;
    text-align: center;
    border: 1px solid #ddd;
}

#invoiceTable th {
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
    color: white;
    border-radius: 5px;
}

#invoiceTable input {
    width: 90%;
    padding: 5px;
    border-radius: 5px;
    border: 1px solid #aaa;
}

button {
    padding: 8px 15px;
    margin: 8px 5px 0 0;
    border: none;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(45deg,#36d1dc,#5b86e5);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

h3 {
    margin-top: 20px;
    text-align: right;
    font-size: 20px;
    color: #ff416c;
}

.removeBtn {
    background: linear-gradient(45deg,#ff4b2b,#ff416c);
}

.removeBtn:hover {
    transform: scale(1.1);
}

/* Print only the invoice */
@media print {
  body * {
    visibility: hidden;
  }
  #invoiceContainer, #invoiceContainer * {
    visibility: visible;
  }
  #invoiceContainer {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
  }
}
</style>
</head>
<body>

<div id="invoiceContainer">
<h2>व्यापारी बिल</h2>

<input type="text" id="companyName" placeholder="कम्पनी / पसलको नाम">
<input type="text" id="sellerMobile" placeholder="विक्रेताको मोबाइल नम्बर (Optional)">
<input type="text" id="sellerName" placeholder="विक्रेताको नाम">
<input type="text" id="buyerName" placeholder="किन्ने व्यक्तिको नाम">
<input type="text" id="buyerMobile" placeholder="किन्ने व्यक्तिको मोबाइल नम्बर (Optional)">

<table id="invoiceTable">
<tr>
<th>सामानको नाम</th>
<th>प्रकार</th>
<th>Quantity</th>
<th>Unit Price</th>
<th>Total</th>
<th>Action</th>
</tr>
<tr>
<td><input type="text" class="itemName" required></td>
<td><input type="text" class="itemType" required></td>
<td><input type="number" class="itemQty" value="1" min="1"></td>
<td><input type="number" class="itemPrice" value="0" min="0"></td>
<td class="itemTotal">0</td>
<td><button class="removeBtn">Remove</button></td>
</tr>
</table>

<button id="addItemBtn">Add Item</button>
<h3>Grand Total: <span id="grandTotal">0</span></h3>
<button id="printBillBtn">Print Bill</button>
</div>

<script>
// Add/Remove Items & Auto Calculation
const invoiceTable = document.getElementById("invoiceTable");
const addItemBtn = document.getElementById("addItemBtn");

function calculateTotals() {
    let rows = invoiceTable.rows;
    let grandTotal = 0;
    for (let i=1; i<rows.length; i++){
        let qty = parseFloat(rows[i].querySelector(".itemQty").value) || 0;
        let price = parseFloat(rows[i].querySelector(".itemPrice").value) || 0;
        let total = qty * price;
        rows[i].querySelector(".itemTotal").innerText = total.toFixed(2);
        grandTotal += total;
    }
    document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
}

// Add Item
addItemBtn.addEventListener("click", ()=>{
    let newRow = invoiceTable.insertRow();
    newRow.innerHTML = `
    <td><input type="text" class="itemName" required></td>
    <td><input type="text" class="itemType" required></td>
    <td><input type="number" class="itemQty" value="1" min="1"></td>
    <td><input type="number" class="itemPrice" value="0" min="0"></td>
    <td class="itemTotal">0</td>
    <td><button class="removeBtn">Remove</button></td>
    `;
    attachEvents(newRow);
});

// Attach Events
function attachEvents(row){
    row.querySelector(".itemQty").addEventListener("input", calculateTotals);
    row.querySelector(".itemPrice").addEventListener("input", calculateTotals);
    row.querySelector(".removeBtn").addEventListener("click", ()=>{
        row.remove();
        calculateTotals();
    });
}

// Initial row
attachEvents(invoiceTable.rows[1]);
invoiceTable.addEventListener("input", calculateTotals);

// Print Bill (Invoice only)
document.getElementById("printBillBtn").addEventListener("click", ()=>{
    window.print();
});
</script>

</body>
</html>
<hr>
<h2>🧮 क्यालकुलेटर</h2>
<div id="calculator" style="max-width:300px; margin:auto; background:white; padding:15px; border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.1);">
    <input type="text" id="calcDisplay" disabled style="width:100%; padding:10px; font-size:22px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc; text-align:right;">
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
        <button onclick="appendCalc('7')">7</button>
        <button onclick="appendCalc('8')">8</button>
        <button onclick="appendCalc('9')">9</button>
        <button onclick="appendCalc('/')">÷</button>

        <button onclick="appendCalc('4')">4</button>
        <button onclick="appendCalc('5')">5</button>
        <button onclick="appendCalc('6')">6</button>
        <button onclick="appendCalc('*')">×</button>

        <button onclick="appendCalc('1')">1</button>
        <button onclick="appendCalc('2')">2</button>
        <button onclick="appendCalc('3')">3</button>
        <button onclick="appendCalc('-')">−</button>

        <button onclick="appendCalc('0')">0</button>
        <button onclick="appendCalc('.')">.</button>
        <button onclick="calculateResult()" style="background:#1976d2; color:white;">=</button>
        <button onclick="appendCalc('+')">+</button>

        <button onclick="clearCalc()" style="grid-column:span 4; background:#d32f2f; color:white;">Clear</button>
    </div>
</div>

<script>
const calcDisplay = document.getElementById("calcDisplay");

function appendCalc(val){
    calcDisplay.value += val;
}

function clearCalc(){
    calcDisplay.value = '';
}

function calculateResult(){
    try {
        calcDisplay.value = eval(calcDisplay.value);
    } catch {
        calcDisplay.value = 'Error';
    }
}
</script>
